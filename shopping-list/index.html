<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>쇼핑 리스트</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1f2430;
    --muted: #8a90a0;
    --accent: #4f7cff;
    --accent-soft: #e8eeff;
    --danger: #e5484d;
    --border: #e3e6ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 16px;
  }
  .app {
    width: 100%;
    max-width: 440px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.875rem;
    margin-bottom: 20px;
  }
  form {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--card);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button.add {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button.add:hover { opacity: 0.88; }
  ul {
    list-style: none;
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  li:last-child { border-bottom: none; }
  li.done .name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 50%;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: transparent;
    transition: all 0.15s;
  }
  li.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .name {
    flex: 1;
    font-size: 1rem;
    word-break: break-all;
  }
  .delete {
    border: none;
    background: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .delete:hover { color: var(--danger); background: #fdebec; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 36px 16px;
    font-size: 0.95rem;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .clear-done {
    border: none;
    background: none;
    color: var(--accent);
    font-size: 0.85rem;
    cursor: pointer;
  }
  .clear-done:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="app">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">아이템을 추가하고, 구매하면 체크하세요.</p>

  <form id="add-form">
    <input type="text" id="item-input" placeholder="예: 우유, 계란, 휴지…" autocomplete="off" autofocus />
    <button type="submit" class="add">추가</button>
  </form>

  <ul id="list"></ul>

  <div class="footer">
    <span id="count"></span>
    <button class="clear-done" id="clear-done">완료 항목 삭제</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://zbaoxitoalqpnrwucgpy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_i6QnRCzNd5x_Ysb3ZCOC1w_0zQ6iAY6';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const TABLE = 'shopping_items';

  let items = [];

  const form = document.getElementById('add-form');
  const input = document.getElementById('item-input');
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  const clearDoneBtn = document.getElementById('clear-done');

  async function load() {
    const { data, error } = await supabase
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: true });
    if (error) {
      console.error(error);
      return;
    }
    items = data;
    render();
  }

  function render() {
    list.innerHTML = '';
    if (items.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = '아직 아이템이 없어요. 위에서 추가해 보세요!';
      list.appendChild(empty);
    } else {
      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const check = document.createElement('button');
        check.className = 'checkbox';
        check.textContent = '✓';
        check.setAttribute('aria-label', item.done ? '체크 해제' : '체크');
        check.addEventListener('click', () => toggle(item.id));

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete';
        del.textContent = '✕';
        del.setAttribute('aria-label', '삭제');
        del.addEventListener('click', () => remove(item.id));

        li.append(check, name, del);
        list.appendChild(li);
      });
    }

    const remaining = items.filter(i => !i.done).length;
    count.textContent = items.length === 0
      ? ''
      : `전체 ${items.length}개 · 남은 항목 ${remaining}개`;
    clearDoneBtn.style.visibility =
      items.some(i => i.done) ? 'visible' : 'hidden';
  }

  async function add(name) {
    const { data, error } = await supabase
      .from(TABLE)
      .insert({ name, done: false })
      .select()
      .single();
    if (error) { console.error(error); return; }
    items.push(data);
    render();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const { error } = await supabase
      .from(TABLE)
      .update({ done: !item.done })
      .eq('id', id);
    if (error) { console.error(error); return; }
    item.done = !item.done;
    render();
  }

  async function remove(id) {
    const { error } = await supabase
      .from(TABLE)
      .delete()
      .eq('id', id);
    if (error) { console.error(error); return; }
    items = items.filter(i => i.id !== id);
    render();
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const name = input.value.trim();
    if (!name) return;
    await add(name);
    input.value = '';
    input.focus();
  });

  clearDoneBtn.addEventListener('click', async () => {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;
    const { error } = await supabase
      .from(TABLE)
      .delete()
      .in('id', doneIds);
    if (error) { console.error(error); return; }
    items = items.filter(i => !i.done);
    render();
  });

  load();
</script>
</body>
</html>
